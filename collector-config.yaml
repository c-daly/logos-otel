receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus/miner:
    config:
      scrape_configs:
        - job_name: 'tool-sequence-miner'
          scrape_interval: 5m
          static_configs:
            - targets: ['tool-sequence-miner:8099']
  prometheus/exporter:
    config:
      scrape_configs:
        - job_name: 'agent-swarm-exporter'
          scrape_interval: 30s
          static_configs:
            - targets: ['agent-swarm-exporter:8098']

processors:
  resource:
    attributes:
      - key: environment
        value: "local"
        action: upsert

  cumulativetodelta:

  transform/cloud:
    metric_statements:
      - context: metric
        statements:
          - convert_sum_to_gauge() where metric.name == "claude_code.cost.usage"
          - convert_sum_to_gauge() where metric.name == "claude_code.token.usage"
          - convert_sum_to_gauge() where metric.name == "claude_code.active_time.total"
          - convert_sum_to_gauge() where metric.name == "claude_code.lines_of_code.count"
          - convert_sum_to_gauge() where metric.name == "claude_code.code_edit_tool.decision"
          - convert_sum_to_gauge() where metric.name == "claude_code.session.count"
          - convert_sum_to_gauge() where metric.name == "claude_code.commit.count"
          - convert_sum_to_gauge() where metric.name == "claude_code.pull_request.count"

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"

  otlphttp/loki:
    endpoint: http://loki:3100/otlp

  otlphttp/grafana_cloud:
    endpoint: ${env:GRAFANA_CLOUD_OTLP_ENDPOINT}
    headers:
      Authorization: "Basic ${env:GRAFANA_CLOUD_AUTH_TOKEN}"

  debug:
    verbosity: normal

  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers: [otlp, prometheus/exporter]
      processors: [resource]
      exporters: [prometheus, debug]
    metrics/cloud:
      receivers: [otlp, prometheus/miner, prometheus/exporter]
      processors: [resource, cumulativetodelta, transform/cloud]
      exporters: [otlphttp/grafana_cloud]
    logs:
      receivers: [otlp]
      processors: [resource]
      exporters: [otlphttp/loki, otlphttp/grafana_cloud, debug]
    traces:
      receivers: [otlp]
      processors: [resource]
      exporters: [otlp/tempo, debug]
