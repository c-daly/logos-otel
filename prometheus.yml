global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'tool-sequence-miner'
    scrape_interval: 5m
    static_configs:
      - targets: ['tool-sequence-miner:8099']

  - job_name: 'agent-swarm-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['agent-swarm-exporter:8098']
